name: Deploy MCP to APP VM

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only when the triggering Test run on main succeeded (or on manual
    # dispatch). Prevents shipping a red main to the APP VM.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_VM_HOST }}
          username: ${{ secrets.APP_VM_USER }}
          key: ${{ secrets.APP_VM_SSH_KEY }}
          script: |
            sudo /usr/local/bin/sugra-mcp-deploy
