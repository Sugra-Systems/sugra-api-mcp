name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - '.codex/**'
      - '.Codex/**'
      - '.agents/**'
      - '.github/workflows/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '**/*.md'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,http]"
      - name: Ruff
        run: ruff check sugra_api_mcp tests
      - name: Pytest
        run: pytest
      - name: Import check
        run: python -c "import sugra_api_mcp; from sugra_api_mcp import tools"
      - name: Tools registered
        env:
          SUGRA_API_KEY: dummy_test_key
        run: |
          python -c "
          import asyncio
          from sugra_api_mcp import tools
          from sugra_api_mcp.server import mcp
          async def main():
              t = await mcp.list_tools()
              assert len(t) == 6, f'Expected 6 tools, got {len(t)}'
              print(f'OK: {len(t)} tools registered')
          asyncio.run(main())
          "
