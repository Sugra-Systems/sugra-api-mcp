name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '.gitignore'
      - '**/*.md'
  pull_request:
    branches: [main]
  # workflow_dispatch preserved from the deleted deploy-app-vm.yml: the hosted MCP
  # deploy (the `deploy` job below) is gated on it as the reliable manual kick.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,http]"
      - name: Ruff
        run: ruff check sugra_api_mcp tests
      - name: Pytest
        run: pytest
      - name: Import check
        run: python -c "import sugra_api_mcp; from sugra_api_mcp import tools"
      - name: Tools registered
        env:
          SUGRA_API_KEY: dummy_test_key
        run: |
          python -c "
          import asyncio
          from sugra_api_mcp import tools
          from sugra_api_mcp.server import mcp
          from tests.test_metadata_sync import EXPECTED_TOOL_COUNT
          async def main():
              t = await mcp.list_tools()
              assert len(t) == EXPECTED_TOOL_COUNT, f'Expected {EXPECTED_TOOL_COUNT} tools, got {len(t)}'
              print(f'OK: {len(t)} tools registered')
          asyncio.run(main())
          "

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Hosted app.sugra.ai/mcp redeploy, folded in from the deleted deploy-app-vm.yml
    # (which used a brittle `workflow_run: workflows: ["Test"]` NAME coupling that
    # breaks silently if this workflow is renamed). `needs: test` chains off ALL
    # matrix legs in-file.
    # TEMPORARY FREEZE (board card MCP-4.1): hosted deploy is manual-only
    # (workflow_dispatch) while the OpenAI Apps submission review runs against
    # app.sugra.ai/mcp - runtime merges to main must not auto-change the endpoint
    # under review. On the review verdict restore the original dual-trigger
    # condition verbatim:
    #   if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 15
    # Serialize hosted deploys. This job SSHes to a shared host and runs
    # sugra-mcp-deploy, which does git pull + pip install + systemctl restart
    # against one directory, so two runs at once can tear the install tree.
    # Inert while the freeze above keeps this job on workflow_dispatch, but it
    # must already be in place when the dual-trigger condition is restored.
    # JOB level so the `test` matrix still runs in parallel across runs;
    # cancel-in-progress: false so a queued deploy waits instead of killing an
    # in-flight pip install or service restart.
    concurrency:
      group: mcp-deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Pre-deploy sudo fail-fast probe (INFRA-11.1)
        # The MCP deploy runs `sudo /usr/local/bin/sugra-mcp-deploy` (general root
        # sudo) on the APP VM, so it needs the general waagent NOPASSWD intact -
        # `sudo -n true` is the faithful probe (same as APP; not WEB's scoped -l
        # form). Probe first so a waagent sudoers reset fails with a clear message
        # instead of dying mid-deploy.
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_VM_HOST }}
          username: ${{ secrets.APP_VM_USER }}
          key: ${{ secrets.APP_VM_SSH_KEY }}
          script: |
            if ! sudo -n true 2>/dev/null; then
              echo "FAIL: passwordless sudo is broken on the APP VM (waagent sudoers reset?). Re-assert NOPASSWD via 'az vm run-command', then re-run this workflow. Do NOT manual-SSH-deploy (CI/CD only)."
              exit 1
            fi
            echo "sudo -n OK"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_VM_HOST }}
          username: ${{ secrets.APP_VM_USER }}
          key: ${{ secrets.APP_VM_SSH_KEY }}
          script: |
            set -e
            sudo /usr/local/bin/sugra-mcp-deploy
      - name: Post-deploy smoke (hosted MCP on app.sugra.ai)
        run: |
          for i in 1 2 3 4 5 6; do
            wk="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://app.sugra.ai/.well-known/oauth-protected-resource || echo 000)"
            mcp="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://app.sugra.ai/mcp || echo 000)"
            echo "attempt $i: .well-known -> $wk, /mcp -> $mcp"
            if [ "$wk" = "200" ] && [ "$mcp" != "404" ] && [ "$mcp" != "000" ]; then
              echo "hosted MCP surface healthy"
              exit 0
            fi
            sleep 10
          done
          echo "FAIL: hosted MCP did not come up (.well-known != 200 or /mcp == 404) after deploy."
          exit 1
